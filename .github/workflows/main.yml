name: Train All Models

on:
  push:
    paths:
      - 'data/*.json'
      - 'train_*.py'
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tensorflow==2.15.0 tensorflowjs==4.17.0 numpy

      - name: Train Model 1 — Difficulty
        run: python train_difficulty.py

      - name: Train Model 2 — Topper
        run: python train_topper.py

      - name: Train Model 3 — RankNet
        run: python train_ranknet.py

      - name: Upload all models
        uses: actions/upload-artifact@v4
        with:
          name: all-models
          path: |
            output/difficulty_model/
            output/topper_model/
            output/ranknet/
          retention-days: 90
