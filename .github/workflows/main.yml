name: Train and Export Model

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Pinning versions avoids the Protobuf / Decision Forests bug
          pip install tensorflow==2.15.0 tensorflowjs==4.17.0 numpy

      - name: Run training script
        run: |
          python train.py

      - name: Upload TFJS Model Artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-ready-model
          path: output/tfjs_model/
          retention-days: 14
