# .github/workflows/train.yml

name: Train RankNet

on:
  push:
    paths:
      - 'data/*.json'
      - 'train_ranknet.py'
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tensorflow==2.15.0 tensorflowjs==4.17.0 numpy scipy

      - name: Train RankNet
        run: python train_ranknet.py

      - name: Upload model
        uses: actions/upload-artifact@v4
        with:
          name: ranknet-model
          path: output/ranknet/
          retention-days: 90
